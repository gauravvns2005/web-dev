<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid activity</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
    <style>
        .main{
    display: grid;
    grid-template-columns: 5.5cm 5.5cm 5.5cm 5.5cm 5.5cm 5.5cm 5.5cm;
    grid-template-rows: 1.8cm 1.8cm 1.8cm 10.5cm 1.8cm;
    gap: 10px;
}

.d1{
    grid-column: 1/2;
    grid-row: 1/4;
    align-content: center;
    background-color: green;
    text-align: center;
    color: white;
    font-size: 20px;
    border: 2px solid black;
    /* margin-left: 15px; */
}

.d2{
    grid-column: 2/6;
    grid-row: 1/2;
    border: 2px solid black;
    /* height: 50px; */
    align-content: center;
    /* background-color: aqua; */
    text-align: center;
}

.d3{
    grid-column: 2/5;
    grid-row: 2/3;
    border: 2px solid black;
    align-content: center;
    text-align: center;

}

.d4{
    grid-column-start: 2;
    border: 2px solid black;
    align-content: center;
    text-align: center;
}

.d5{
    grid-column-start: 3;
    border: 2px solid black;
    text-align: center;
    align-content: center;
}

.d6{
    grid-column-start: 4 ;
    border: 2px solid black;
    align-content: center;
    text-align: center;
}

.d7{
    grid-column-start: 5 ;
    border: 2px solid black;
    align-content: center;
    text-align: center;
}

.d8{
    grid-column: 1/2;
    border: 2px solid black;
    /* margin-left: 15px; */
    grid-row: 4/5;
    align-content: center;
    text-align: center;
    background-color: bisque;
    font-size: 20px;
}

.d9{
    grid-column: 2/8;
    grid-row: 4/5;
    border: 2px solid black;
    text-align: center;
    align-content: center;
}

.d12{
    grid-column: 2/8;
    border: 2px solid black;
    text-align: center;
    align-content: center;

}

.d10{
    border: 2px solid black;
    text-align: center;
    align-content: center;
}

.d11{
    border: 2px solid black;
    text-align: center;
    align-content: center;
}
    </style>
</head>
<body>
	<div>This is github tutorial</div>
    <div class="main">
        <div class="d1">Logo</div>
        <div class="d2">2</div>
        <div class="d3">21</div>
        <div class="d4">3</div>
        <div class="d5">4</div>
        <div class="d6">5</div>
        <div class="d7">6</div>
        <div class="d10">7</div>
        <div class="d11">8</div>
	<div class="d8">Navigation</div>
        <div class="d9">content</div>
        <div class="d12">Footer</div>
    </div>
</body>
</html>
